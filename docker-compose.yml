services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: foi
      POSTGRES_PASSWORD: foi
      POSTGRES_DB: foi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://foi:foi@db:5432/foi
    depends_on:
      - db

volumes:
  pgdata:
