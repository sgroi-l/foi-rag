apiVersion: batch/v1
kind: Job
metadata:
  name: foi-rag-ingest
  namespace: foi-rag
spec:
  template:
    spec:
      containers:
        - name: foi-rag-ingest
          image: sgroil/foi-rag-api:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - "uv run scripts/download_pdfs.py && uv run scripts/ingest_all.py"
          envFrom:
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
      restartPolicy: Never
  backoffLimit: 0
